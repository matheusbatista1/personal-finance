version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    target-branch: "develop"
    groups:
      next:
        patterns:
          - "next"
          - "next-*"
          - "@next/*"
          - "eslint-config-next"
      react:
        patterns:
          - "react"
          - "react-dom"
          - "@types/react"
          - "@types/react-dom"
      testing:
        patterns:
          - "vitest"
          - "@vitest/*"
          - "@testing-library/*"
          - "@playwright/test"
          - "playwright"
          - "jsdom"
      lint:
        patterns:
          - "eslint"
          - "eslint-*"
          - "prettier"
          - "prettier-*"
      commit-tools:
        patterns:
          - "husky"
          - "lint-staged"
          - "@commitlint/*"
      tailwind:
        patterns:
          - "tailwindcss"
          - "@tailwindcss/*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    target-branch: "develop"
